<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game74 | なわとびテンポチェッカー</title>
    <style>
      :root {
        --bg: #e9eaee;
        --ink: #0e1830;
        --sub: #7e8697;
        --accent: #6164e3;
        --accent-2: #4e45db;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #000;
        color: var(--ink);
      }

      .top-space {
        height: 176px;
        position: relative;
      }

      .back-btn {
        position: absolute;
        left: 24px;
        top: 84px;
        width: 116px;
        height: 116px;
        border-radius: 50%;
        border: 0;
        background: rgba(42, 44, 52, 0.7);
        color: #f0f2f6;
        font-size: 76px;
        line-height: 0;
        cursor: pointer;
      }

      .app {
        background: var(--bg);
        min-height: calc(100vh - 176px);
        padding-bottom: 52px;
      }

      .titlebar {
        height: 96px;
        background: #fff;
        border-bottom: 1px solid #e5e6ea;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-size: clamp(24px, 4vw, 56px);
        font-weight: 800;
        color: #384156;
      }

      .titlebar .wave {
        color: var(--accent);
        font-size: 40px;
      }

      main {
        width: min(890px, 100vw - 44px);
        margin: 0 auto;
        text-align: center;
        padding-top: 90px;
      }

      .label {
        font-size: clamp(24px, 3.8vw, 68px);
        color: #727b8f;
        font-weight: 700;
      }

      .bpm {
        margin-top: 22px;
        font-size: clamp(86px, 21vw, 176px);
        font-weight: 900;
        letter-spacing: 0.01em;
        color: #0b1630;
      }

      .bpm span {
        font-size: 0.38em;
        color: #99a0af;
        font-weight: 700;
        margin-left: 0.12em;
      }

      .pad {
        margin: 84px auto 72px;
        width: min(680px, 84vw);
        aspect-ratio: 1;
        border-radius: 50%;
        border: 0;
        background: var(--accent);
        color: #f4f5ff;
        box-shadow: 0 22px 34px rgba(58, 63, 173, 0.22);
        display: grid;
        place-content: center;
        gap: 18px;
        cursor: pointer;
        transition: transform 80ms ease, filter 80ms ease;
      }

      .pad:active,
      .pad.active {
        transform: scale(0.985);
        filter: brightness(1.06);
      }

      .tap-title {
        font-size: clamp(58px, 10vw, 114px);
        font-weight: 800;
        line-height: 1;
      }

      .tap-sub {
        font-size: clamp(24px, 4.2vw, 50px);
        color: #ccd0e8;
        font-weight: 700;
      }

      .action-btn,
      .reset-btn {
        width: 100%;
        border-radius: 42px;
        padding: 28px 24px;
        font-size: clamp(30px, 5.3vw, 54px);
        font-weight: 800;
      }

      .action-btn {
        border: 0;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #f0f2ff;
        box-shadow: 0 8px 20px rgba(46, 41, 142, 0.28);
      }

      .reset-btn {
        margin-top: 34px;
        border: 6px solid #d4d7de;
        background: transparent;
        color: #596276;
      }
    </style>
  </head>
  <body>
    <div class="top-space">
      <button class="back-btn" aria-label="戻る">‹</button>
    </div>
    <div class="app">
      <header class="titlebar"><span class="wave">〰</span>なわとびテンポチェッカー</header>
      <main>
        <div class="label">現在のテンポ</div>
        <div class="bpm" id="bpm">--<span>BPM</span></div>

        <button class="pad" id="tapPad" aria-label="tap area">
          <div class="tap-title">TAP</div>
          <div class="tap-sub">ジャンプに合わせて押す</div>
        </button>

        <button class="action-btn" id="copyBpmBtn">⧉ テンポをコピーする</button>
        <button class="reset-btn" id="resetBtn">⟲ リセット</button>
      </main>
    </div>

    <script>
      const taps = [];
      const intervals = [];
      const maxWindow = 8;
      const timeoutMs = 4000;
      let lastTap = 0;
      let timeoutId;

      const bpmEl = document.getElementById('bpm');
      const tapPad = document.getElementById('tapPad');
      const copyBpmBtn = document.getElementById('copyBpmBtn');
      let currentBpm = null;

      const median = (arr) => {
        const sorted = [...arr].sort((a, b) => a - b);
        const m = Math.floor(sorted.length / 2);
        return sorted.length % 2 ? sorted[m] : (sorted[m - 1] + sorted[m]) / 2;
      };

      function clearState() {
        taps.length = 0;
        intervals.length = 0;
        lastTap = 0;
        bpmEl.innerHTML = '--<span>BPM</span>';
        currentBpm = null;
      }

      function scheduleAutoReset() {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(clearState, timeoutMs);
      }

      function updateView() {
        if (intervals.length < 2) return;
        const med = median(intervals);
        const bpm = Math.round(60000 / med);
        bpmEl.innerHTML = `${bpm}<span>BPM</span>`;
        currentBpm = bpm;
      }

      function onTap() {
        const now = performance.now();
        taps.push(now);
        if (lastTap > 0) {
          const d = now - lastTap;
          if (d > 180 && d < 2000) {
            intervals.push(d);
            if (intervals.length > maxWindow) intervals.shift();
          }
        }
        lastTap = now;
        updateView();
        scheduleAutoReset();
      }

      ['pointerdown', 'keydown'].forEach((eventName) => {
        tapPad.addEventListener(eventName, (event) => {
          if (eventName === 'keydown' && ![' ', 'Enter'].includes(event.key)) return;
          if (eventName === 'keydown') event.preventDefault();
          tapPad.classList.add('active');
          onTap();
          setTimeout(() => tapPad.classList.remove('active'), 80);
        });
      });

      copyBpmBtn.addEventListener('click', async () => {
        if (!Number.isFinite(currentBpm)) return;
        const text = `テンポ ${currentBpm} BPM`;
        await navigator.clipboard.writeText(text);
        copyBpmBtn.textContent = '✓ コピーしました';
        setTimeout(() => {
          copyBpmBtn.textContent = '⧉ テンポをコピーする';
        }, 1000);
      });

      document.getElementById('resetBtn').addEventListener('click', clearState);
    </script>
  </body>
</html>
