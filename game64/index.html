<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>かくれんぼv3（かずはっけん）</title>
  <style>
    :root {
      --ink: #283341;
      --primary: #4d79ee;
      --soft: #eaf0ff;
      --ok: #198a59;
      --warn: #b36512;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f3f9ff, #fffef7);
    }
    .app {
      width: min(920px, 95vw);
      margin: 14px auto 24px;
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 28px rgba(38, 59, 117, 0.16);
    }
    h1 { margin: 0; color: #274bb1; font-size: clamp(1.35rem, 4.2vw, 2rem); }
    .lead { margin: 8px 0 12px; color: #596171; }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .chip {
      background: var(--soft);
      border-radius: 12px;
      text-align: center;
      font-weight: 700;
      padding: 10px;
    }

    .stage {
      position: relative;
      border-radius: 14px;
      border: 2px solid #d9e4ff;
      min-height: 330px;
      overflow: hidden;
      background: linear-gradient(180deg, #dff2ff 0%, #dcf9d7 62%, #bee6a8 100%);
    }
    .cover {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 800;
      color: #2d4b9e;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(2px);
    }
    .cover.show { display: flex; }

    .item {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 1.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(77, 121, 238, 0.28);
      transform: scale(0);
      transition: transform 180ms ease;
    }
    .item.show { transform: scale(1); }

    .msg {
      margin-top: 10px;
      padding: 9px;
      border-radius: 12px;
      min-height: 2.2em;
      text-align: center;
      font-weight: 700;
      background: #f8faff;
    }
    .msg.ok { background: #e9fff3; color: var(--ok); }
    .msg.ng { background: #fff4ea; color: var(--warn); }

    .grid {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 11px 8px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      background: var(--primary);
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
    .soft { background: #6f7ea5; }

    .meta-panel {
      margin-top: 10px;
      border: 1px solid #dbe4ff;
      background: #fbfcff;
      border-radius: 12px;
      padding: 10px;
    }
    .meta-panel h2 { margin: 0 0 8px; font-size: 1rem; color: #3c56a8; }
    .strategy { display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(0, 1fr)); }

    @media (max-width: 700px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .strategy { grid-template-columns: 1fr; }
      .stage { min-height: 290px; }
      .item { width: 40px; height: 40px; font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>かくれんぼv3「かずはっけん」</h1>
    <p class="lead">見えた数を答えたあとに「どう数えたか」も選ぶ、メタ認知つきトレーニング。</p>

    <section class="hud" aria-label="ステータス">
      <div class="chip">もんだい: <span id="round">1</span>/10</div>
      <div class="chip">せいかい: <span id="correct">0</span></div>
      <div class="chip">レベル: <span id="level">1</span></div>
      <div class="chip">作戦pt: <span id="metaScore">0</span></div>
    </section>

    <section class="stage" aria-live="polite">
      <div id="layer"></div>
      <div id="cover" class="cover">かくれたよ！ いくつだった？</div>
    </section>

    <p id="message" class="msg">「はじめる」を押してね。</p>

    <div id="answers" class="grid"></div>

    <div class="actions">
      <button id="start">はじめる</button>
      <button id="next" class="soft" disabled>つぎへ</button>
      <button id="hint" class="soft" disabled>ヒント</button>
    </div>

    <section id="metaPanel" class="meta-panel" hidden>
      <h2>どうやって数えた？（ふりかえり）</h2>
      <div class="strategy">
        <button data-strategy="one">1こずつ数えた</button>
        <button data-strategy="group">かたまりで見た</button>
        <button data-strategy="five">5 + のこりで見た</button>
      </div>
    </section>
  </main>

  <script>
    const state = {
      round: 1,
      total: 10,
      correct: 0,
      level: 1,
      answer: 0,
      revealMs: 2200,
      solved: false,
      lastPattern: "cluster"
    };

    const icons = ["🐰", "🐼", "🐻", "🐤", "🐸", "🐶"];
    const ui = {
      round: document.getElementById("round"),
      correct: document.getElementById("correct"),
      level: document.getElementById("level"),
      metaScore: document.getElementById("metaScore"),
      layer: document.getElementById("layer"),
      cover: document.getElementById("cover"),
      message: document.getElementById("message"),
      answers: document.getElementById("answers"),
      start: document.getElementById("start"),
      next: document.getElementById("next"),
      hint: document.getElementById("hint"),
      metaPanel: document.getElementById("metaPanel")
    };

    let metaScore = 0;

    function updateHud() {
      ui.round.textContent = state.round;
      ui.correct.textContent = state.correct;
      ui.level.textContent = state.level;
      ui.metaScore.textContent = metaScore;
    }

    function msg(text, type = "") {
      ui.message.textContent = text;
      ui.message.className = `msg ${type}`;
    }

    function disableAnswers(flag) {
      ui.answers.querySelectorAll("button").forEach(btn => btn.disabled = flag);
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function levelRange() {
      if (state.level <= 2) return [1, 5];
      if (state.level <= 4) return [4, 8];
      return [6, 10];
    }

    function makePattern(total) {
      const mode = Math.random() < 0.5 ? "cluster" : "tenframe";
      state.lastPattern = mode;
      const points = [];

      if (mode === "tenframe") {
        // 5と5の構造を見やすくする配置
        const slots = [];
        for (let r = 0; r < 2; r++) {
          for (let c = 0; c < 5; c++) {
            slots.push({ x: 15 + c * 14, y: 26 + r * 20 });
          }
        }
        for (let i = 0; i < total; i++) points.push(slots[i]);
      } else {
        // かたまり配置
        let remain = total;
        while (remain > 0) {
          const chunk = Math.min(remain, randInt(1, 3));
          const cx = randInt(14, 84);
          const cy = randInt(15, 62);
          for (let i = 0; i < chunk; i++) {
            points.push({ x: cx + randInt(-5, 5), y: cy + randInt(-5, 5) });
          }
          remain -= chunk;
        }
      }
      return points.slice(0, total);
    }

    async function showQuestion() {
      state.solved = false;
      ui.metaPanel.hidden = true;
      ui.next.disabled = true;
      ui.hint.disabled = true;
      disableAnswers(true);
      ui.cover.classList.remove("show");
      ui.layer.innerHTML = "";

      const [min, max] = levelRange();
      state.answer = randInt(min, max);
      const points = makePattern(state.answer);

      points.forEach((p, i) => {
        const el = document.createElement("div");
        el.className = "item";
        el.textContent = icons[randInt(0, icons.length - 1)];
        el.style.left = `${p.x}%`;
        el.style.top = `${p.y}%`;
        el.style.transitionDelay = `${i * 30}ms`;
        ui.layer.appendChild(el);
      });

      msg("よーく見てね…", "");
      await wait(280);
      ui.layer.querySelectorAll(".item").forEach(el => el.classList.add("show"));
      await wait(state.revealMs);

      ui.cover.classList.add("show");
      msg("いくついたかな？", "");
      disableAnswers(false);
      ui.hint.disabled = false;
    }

    function wait(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function answer(n) {
      if (state.solved) return;
      state.solved = true;
      disableAnswers(true);
      ui.hint.disabled = true;

      if (n === state.answer) {
        state.correct += 1;
        if (state.correct % 2 === 0 && state.level < 5) state.level += 1;
        state.revealMs = Math.max(1200, state.revealMs - 120);
        msg(`せいかい！ ${state.answer}こ（にん）だったね。`, "ok");
      } else {
        if (state.level > 1) state.level -= 1;
        state.revealMs = Math.min(2600, state.revealMs + 140);
        msg(`おしい！ ただしくは ${state.answer}。`, "ng");
      }

      ui.metaPanel.hidden = false;
      ui.next.disabled = state.round >= state.total;
      if (state.round >= state.total) {
        ui.start.disabled = false;
        ui.start.textContent = "もういちど";
      }
      updateHud();
    }

    function renderAnswerButtons() {
      ui.answers.innerHTML = "";
      for (let i = 1; i <= 10; i++) {
        const b = document.createElement("button");
        b.textContent = i;
        b.addEventListener("click", () => answer(i));
        ui.answers.appendChild(b);
      }
      disableAnswers(true);
    }

    ui.start.addEventListener("click", async () => {
      state.round = 1;
      state.correct = 0;
      state.level = 1;
      state.revealMs = 2200;
      metaScore = 0;
      ui.start.disabled = true;
      ui.start.textContent = "プレイ中";
      updateHud();
      await showQuestion();
    });

    ui.next.addEventListener("click", async () => {
      state.round += 1;
      updateHud();
      await showQuestion();
    });

    ui.hint.addEventListener("click", () => {
      if (state.lastPattern === "tenframe") {
        msg("ヒント: 上の5こと下の5こで、5 + のこり を考えてみよう。", "");
      } else {
        msg("ヒント: 近くのなかまを1つのかたまりとして見ると早いよ。", "");
      }
    });

    document.querySelectorAll("[data-strategy]").forEach(btn => {
      btn.addEventListener("click", () => {
        const mode = btn.dataset.strategy;
        const good = (mode === "five" && state.answer >= 6) || (mode === "group" && state.lastPattern === "cluster") || (mode === "one" && state.answer <= 4);
        metaScore += good ? 2 : 1;
        msg(good ? "いいふりかえり！ その作戦は今日の問題に合ってるね。" : "ナイスふりかえり！ 次は別の作戦も試してみよう。", "ok");
        updateHud();
      });
    });

    renderAnswerButtons();
    updateHud();
  </script>
</body>
</html>
